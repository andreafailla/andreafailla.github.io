# Hugo Blox GitHub Action to convert Bibtex publications to Markdown-based webpages
name: Import Publications From Bibtex

# Require permission to create a PR
permissions:
  contents: write
  pull-requests: write

# Run workflow when a `.bib` file is added or updated in the `data/` folder
on:
  schedule:
    - cron: '0 3 * * 1'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  hugoblox:
    if: github.repository_owner != 'HugoBlox'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0
          pip install google-search-results
      - name: Generate publications.bib from Google Scholar (SerpAPI)
        # Requires repository secrets: SERPAPI_KEY and SCHOLAR_ID
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_ID: ${{ secrets.SCHOLAR_ID }}
        run: |
          if [ -z "${SERPAPI_KEY}" ] || [ -z "${SCHOLAR_ID}" ]; then
            echo "SERPAPI_KEY or SCHOLAR_ID not set; skipping Scholar generation."
          else
            python scripts/generate_bib_from_scholar.py
          fi
      - name: Run Academic (Bibtex To Markdown Converter)
        # Run import only if `publications.bib` exists in the workspace
        run: |
          if [ -f publications.bib ]; then
            academic import publications.bib content/publication/ --compact
          else
            echo "publications.bib not found; skipping academic import."
          fi
      - name: Commit and push changes
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add publications.bib content/publication/
            git commit -m "content: import publications from Scholar"
            git push
          else
            echo "No publication changes to commit."
          fi
